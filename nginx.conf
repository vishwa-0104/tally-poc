map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/syncinvoice.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syncinvoice.in/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API requests to the backend service
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # React SPA — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
