<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #fff;
    }

    .header {
      background: linear-gradient(135deg, #0f766e, #0d9488);
      color: white;
      padding: 16px;
    }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .header p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .body { padding: 14px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #6b7280; }
    .value { font-weight: 600; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.active   { background: #d1fae5; color: #065f46; }
    .badge.inactive { background: #fef3c7; color: #92400e; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: #10b981; }
    .dot.yellow { background: #f59e0b; }

    #test-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: #0d9488;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #test-btn:hover { background: #0f766e; }
    #test-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #status-msg {
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    #status-msg.ok  { background: #d1fae5; color: #065f46; display: block; }
    #status-msg.err { background: #fee2e2; color: #991b1b; display: block; }

    .footer {
      padding: 10px 14px;
      border-top: 1px solid #f3f4f6;
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tally Bill Sync</h1>
    <p>Browser extension v<span id="version">–</span></p>
  </div>

  <div class="body">
    <div class="row">
      <span class="label">Extension</span>
      <span class="badge active"><span class="dot green"></span>Active</span>
    </div>
    <div class="row">
      <span class="label">Tally port</span>
      <input id="port-input" type="number" value="9000"
        style="width:70px;padding:3px 6px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;text-align:right;" />
    </div>

    <button id="test-btn">Test Tally Connection</button>
    <div id="status-msg"></div>
  </div>

  <div class="footer">
    Keep Tally ERP open on the configured port while syncing.
  </div>

  <script src="popup.js"></script>
</body>
</html>
